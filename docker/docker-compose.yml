version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: leadgen-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadgen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadgen_secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-leadgen_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadgen_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadgen-network

  # Redis for Celery broker and caching
  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadgen-network

  # FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: leadgen-backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leadgen_user}:${POSTGRES_PASSWORD:-leadgen_secure_password_123}@postgres:5432/${POSTGRES_DB:-leadgen_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-change-me}
      DEBUG: "${DEBUG:-false}"
      PLAYWRIGHT_HEADLESS: "${PLAYWRIGHT_HEADLESS:-true}"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@leadgen.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!ChangeMe}
    volumes:
      - ../backend/app:/app/app
      - uploads:/app/uploads
      - ../logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadgen-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: leadgen-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leadgen_user}:${POSTGRES_PASSWORD:-leadgen_secure_password_123}@postgres:5432/${POSTGRES_DB:-leadgen_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PLAYWRIGHT_HEADLESS: "${PLAYWRIGHT_HEADLESS:-true}"
    volumes:
      - ../backend/app:/app/app
      - uploads:/app/uploads
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadgen-network
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # Celery Flower (Monitoring)
  flower:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: leadgen-flower
    env_file:
      - ../.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    networks:
      - leadgen-network
    command: celery -A app.workers.celery_app flower --port=5555

  # Next.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: leadgen-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-LeadGen Platform}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - leadgen-network

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  leadgen-network:
    driver: bridge
